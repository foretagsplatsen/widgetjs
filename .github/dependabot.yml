version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: "daily" # runs on every weekday, Monday to Friday
    ignore:
      # We can't update these dependencies without doing a lot of work:
      - dependency-name: "jquery*"
    commit-message:
      # Add the basecamp's "Client-side code" project id to commit messages:
      prefix: "15549487: "
